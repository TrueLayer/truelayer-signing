name: "CodeQL Config"

# PHP isn't included here as it's not supported by CodeQL
paths:
  - .github
  - csharp
  - go
  - java
  - java7
  - nodejs
  - python
  - ruby
  - rust

paths-ignore:
  - '**/*.md'
  - '**/examples/**'
  - '**/test/**'
  - '**/tests/**'
  - '**/node_modules/**'
  - '**/vendor/**'
  - '**/target/**'
  - '**/bin/**'
  - '**/obj/**'
  - '**/.gradle/**'
  - '**/gradle/wrapper/**'

