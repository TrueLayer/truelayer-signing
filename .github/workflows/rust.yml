name: Rust

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/rust.yml'
      - 'rust/**'
      - 'test-resources/**'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/rust.yml'
      - 'rust/**'
      - 'test-resources/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - run: rustup update stable
    - uses: actions/checkout@v7
    - run: cd rust && cargo test

  rustfmt:
    runs-on: ubuntu-latest
    steps:
    - run: rustup update stable
    - uses: actions/checkout@v7
    - run: cargo fmt --manifest-path=rust/Cargo.toml -- --check
    - run: cargo fmt --manifest-path=rust/examples/webhook-server/Cargo.toml -- --check

  examples:
    runs-on: ubuntu-latest
    steps:
    - run: rustup update stable
    - uses: actions/checkout@v7
    - run: cargo check --manifest-path=rust/examples/webhook-server/Cargo.toml

  publish:
    name: Rust Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    # release-plz opens release PRs and creates git tags / GitHub releases.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5
        with:
          project_manifest: rust/Cargo.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
