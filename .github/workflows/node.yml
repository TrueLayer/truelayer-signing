name: Node

on:
  push:
    branches: [ main ]
    tags:
      - "nodejs/v**"
    paths:
      - '.github/workflows/node.yml'
      - 'nodejs/**'
      - 'test-resources/**'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/node.yml'
      - 'nodejs/**'
      - 'test-resources/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 'lts/*'
    - run: cd nodejs && yarn --frozen-lockfile && yarn test
  
  publish:
    runs-on: ubuntu-latest
    # Runs only on tags push
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    needs: test
    permissions:
      contents: read
      # Required for npm trusted publishing via OIDC
      id-token: write
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 'lts/*'
        registry-url: 'https://registry.npmjs.org'
    - name: Upgrade npm
      # Trusted publishing (OIDC) requires npm >= 11.5.1, newer than the version
      # bundled with the Node LTS release
      run: npm install -g "npm@^11.5.1"
    - name: Get version from tag
      uses: actions-ecosystem/action-regex-match@v2
      id: regex-match
      with:
        text: ${{ github.ref_name }}
        # matches tags starting with "nodejs/v" and uses the rest of the string as the version
        regex: 'nodejs\/v(.*)'
    - name: Publish to npm
      run: |
        cd nodejs
        yarn --frozen-lockfile
        VERSION="${{ steps.regex-match.outputs.group1 }}"
        if [ -z "$VERSION" ]; then
          echo "::error::Could not extract a version from tag '${{ github.ref_name }}'"
          exit 1
        fi
        npm version "$VERSION" --no-git-tag-version --allow-same-version
        npm publish
